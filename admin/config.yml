backend:
  name: git-gateway
  branch: main

media_folder: "img"
public_folder: "/img"

locale: "fr"

site_url: https://sevauto.netlify.app
display_url: https://sevauto.netlify.app

collections:
  - name: "actualites"
    label: "Actualités"
    files:
      - name: "articles"
        label: "Articles du blog"
        file: "articles.json"
        format: json
        description: "Ajoutez, modifiez ou supprimez les articles affichés sur la page Actualités."
        fields:
          - label: "Articles"
            name: "articles"
            label_singular: "Article"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Titre", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime", date_format: "DD/MM/YYYY", time_format: false, format: "YYYY-MM-DD" }
              - { label: "Image de couverture", name: "image", widget: "image", required: false }
              - { label: "Résumé", name: "summary", widget: "text", required: false }
              - { label: "Contenu", name: "body", widget: "markdown" }
