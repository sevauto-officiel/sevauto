<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex" />
  <meta name="theme-color" content="#1a9d56" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AKMServive Admin" />
  <title>AKMServive — Administration du contenu</title>
  <style>
    /* Optimisations pour la gestion depuis un téléphone (Android / iPhone). */
    html, body { margin: 0; height: 100%; -webkit-text-size-adjust: 100%; }

    #loading {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: #f5f6f8; color: #1d1d1f; z-index: 9999; text-align: center; padding: 24px;
    }
    #loading .dot {
      width: 30px; height: 30px; border-radius: 50%;
      border: 3px solid #d2d4d8; border-top-color: #1a9d56;
      animation: spin 0.8s linear infinite;
    }
    #loading p { margin: 0; font-size: 15px; color: #6e6e73; }
    #loading strong { font-size: 18px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Aperçus d'images raisonnables dans l'éditeur (PC comme mobile) :
       les photos uploadées ne s'affichent plus en pleine taille. */
    #nc-root img,
    [class*="ControlContainer"] img,
    [class*="control-component"] img,
    [class*="card-"] img,
    .nc-controlPane-control img,
    [class*="ListControl"] img,
    [class*="WidgetPreviewContainer"] img,
    [class*="PreviewContainer"] img {
      max-height: 160px !important;
      max-width: 240px !important;
      width: auto !important;
      height: auto !important;
      object-fit: contain !important;
    }

    /* Le logo de connexion peut rester un peu plus grand. */
    #nc-root section img:first-of-type {
      max-height: 220px !important;
      max-width: 320px !important;
    }

    @media (max-width: 799px) {
      /* Zones tactiles plus grandes et formulaires pleine largeur sur mobile. */
      .nc-controlPane-control input,
      .nc-controlPane-control textarea,
      .nc-controlPane-control select,
      [class*="ControlInput"] input,
      [class*="ControlInput"] textarea {
        font-size: 16px !important; /* évite le zoom auto iOS */
        min-height: 44px;
      }
      button, [role="button"] { min-height: 44px; }
      /* Le panneau d'aperçu est masqué pour laisser toute la place à l'édition. */
      [class*="PreviewPaneFrame"],
      [class*="PreviewPaneContainer"] { display: none !important; }
      [class*="EditorContent"] > div { width: 100% !important; }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="dot" aria-hidden="true"></div>
    <strong>AKMServive — Administration</strong>
    <p>Chargement de l'espace de gestion…</p>
  </div>

  <!-- Connexion via Netlify Identity -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Decap CMS (ancien Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js"></script>
  <script>
    // Retire l'écran de chargement une fois le CMS affiché.
    window.addEventListener('load', function () {
      setTimeout(function () {
        var el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      }, 1500);
    });
  </script>
</body>
</html>
